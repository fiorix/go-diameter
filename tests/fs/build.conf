# sdme fs build config for the go-diameter / FreeDiameter interop test
# rootfs. Provides:
#   - Go toolchain (for building tests/go/... at scenario-time)
#   - FreeDiameter from open5gs/freeDiameter (pinned commit) installed
#     under /usr/local, extensions under /usr/local/lib/freeDiameter.
#   - tcpdump + iproute2 for in-container capture and diagnostics.
#
# Usage:
#   sudo sdme fs import ubuntu docker.io/ubuntu -v --install-packages=yes
#   sudo sdme fs build godiam-fd tests/fs/build.conf -v

FROM ubuntu

RUN apt-get update && \
    DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
        ca-certificates git \
        cmake make gcc g++ bison flex pkg-config \
        libsctp-dev libgnutls28-dev libgcrypt-dev libidn11-dev \
        libjsoncpp-dev libxml2-dev \
        ssl-cert gettext-base iproute2 tcpdump procps \
        curl && \
    rm -rf /var/lib/apt/lists/*

COPY tests/fs/scripts/install-fd.sh /usr/local/bin/install-fd.sh
RUN chmod +x /usr/local/bin/install-fd.sh && /usr/local/bin/install-fd.sh

# Sanity check: both toolchains must be functional.
RUN go version && freeDiameterd -V 2>/dev/null || true
